<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Idle Cards Game</title>

<style>

body{
font-family:Arial;
background:#121212;
color:white;
text-align:center;
margin:0;
}

.topbar{
background:#1e1e1e;
padding:15px;
font-size:18px;
}

.container{
padding:20px;
}

.card{
border-radius:20px;
padding:20px;
margin:15px;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.basic{
background:#444;
}

.super{
background:#1f6fff;
}

.ultra{
background:#ff8c2a;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
margin-top:10px;
font-size:16px;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.locked{
background:gray;
}

.claim{
background:#3cff73;
}

.upgrade{
background:#ffd54a;
}

</style>
</head>

<body>

<div class="topbar">
Coins: <span id="coins">0</span>
<br>
Coins / hour: <span id="coinsHour">0</span>
</div>

<div class="container">

<div class="card basic">
<h2>Basic</h2>
Level: <span id="basicLevel">1</span>
<br>
<button class="upgrade" onclick="upgradeBasic()">Upgrade (50)</button>
</div>

<div id="superCard" style="display:none" class="card super">
<h2>Super</h2>
Level: <span id="superLevel">1</span>
<br>
<button class="upgrade" onclick="upgradeSuper()">Upgrade (150)</button>
</div>

<div id="ultraCard" style="display:none" class="card ultra">
<h2>Ultra</h2>
Level: <span id="ultraLevel">1</span>
<br>
<button class="upgrade" onclick="upgradeUltra()">Upgrade (400)</button>
</div>

<h2>Mega Gifts</h2>

<div id="gift1">
Mega Gift
<br>
500 Coins
<br>
<button class="claim" onclick="claimGift()">Claim</button>
</div>
</div>

<script>

let coins=0
let coinsHour=5

let basicLevel=1
let superLevel=1
let ultraLevel=1

let superUnlocked=false
let ultraUnlocked=false

function updateUI(){
document.getElementById("coins").innerText=Math.floor(coins)
document.getElementById("coinsHour").innerText=coinsHour
}

setInterval(()=>{
coins+=coinsHour/3600
updateUI()
},1000)

function upgradeBasic(){
let cost=50*basicLevel
if(coins>=cost){
coins-=cost
basicLevel++
coinsHour+=5
document.getElementById("basicLevel").innerText=basicLevel

if(basicLevel>=5 && !superUnlocked){
superUnlocked=true
document.getElementById("superCard").style.display="block"
}

updateUI()
}
}

function upgradeSuper(){
let cost=150*superLevel
if(coins>=cost){
coins-=cost
superLevel++
coinsHour+=15
document.getElementById("superLevel").innerText=superLevel

if(superLevel>=5 && !ultraUnlocked){
ultraUnlocked=true
document.getElementById("ultraCard").style.display="block"
}

updateUI()
}
}

function upgradeUltra(){
let cost=400*ultraLevel
if(coins>=cost){
coins-=cost
ultraLevel++
coinsHour+=40
document.getElementById("ultraLevel").innerText=ultraLevel
updateUI()
}
}

function claimGift(){
coins+=500
document.getElementById("gift1").style.display="none"
updateUI()
}

updateUI()

</script>

</body>
</html>
