<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hypercharged KarKerKarKurKur</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

h1{
margin-top:10px;
}

.container{
padding:20px;
}

.cards{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.card{
background:#222;
padding:15px;
border-radius:12px;
width:160px;
box-shadow:0 0 10px #000;
}

button{
padding:10px;
border:none;
border-radius:8px;
margin-top:5px;
cursor:pointer;
font-weight:bold;
}

.upgrade{
background:#3aa0ff;
color:white;
}

.hyper{
background:purple;
color:white;
}

.locked{
background:#555;
}

.claim{
background:#2ecc71;
color:white;
font-size:18px;
}

.daily{
background:orange;
}

.rebirth{
background:red;
color:white;
}

</style>
</head>

<body>

<h1>Hypercharged KarKerKarKurKur</h1>

<div class="container">

<h2 id="coins">Coins: 0</h2>
<h3 id="cph">Coins / Hour: 0</h3>

<button class="claim" onclick="claimCoins()">Claim Coins</button>

<br><br>

<button class="daily" onclick="daily()">Daily 🎁</button>
<p id="dailyStatus"></p>

<br>

<button class="rebirth" onclick="rebirth()">Rebirth 🔥 (10000)</button>
<p id="rebirths"></p>

<div class="cards">

<div class="card">
<h3>Basic</h3>
<p id="basicPower">Power 1/3</p>
<button class="upgrade" onclick="upgrade('basic')">⬆ Upgrade</button>
<button class="hyper" onclick="hyper('basic')">Hyper</button>
</div>

<div class="card">
<h3>Kar Ker Kar Kur Kur</h3>
<p id="karPower">LOCKED</p>
<button id="unlockKar" onclick="unlockKar()">Unlock (1000)</button>
<button class="upgrade" onclick="upgrade('kar')">⬆ Upgrade</button>
<button class="hyper" onclick="hyper('kar')">Hyper</button>
</div>

</div>

</div>

<script>

let save = JSON.parse(localStorage.getItem("gameSave")) || {

coins:0,

rebirths:0,

basicPower:1,
basicHyper:false,

karUnlocked:false,
karPower:0,
karHyper:false,

lastClaim:Date.now(),
lastDaily:0

}

function coinsPerHour(){

let total=0

total+=save.basicPower*5
if(save.basicHyper) total*=2

if(save.karUnlocked){
total+=save.karPower*10
if(save.karHyper) total*=2
}

return total

}

function claimCoins(){

let now=Date.now()

let hours=(now-save.lastClaim)/3600000

let reward=Math.floor(hours*coinsPerHour())

save.coins+=reward

save.lastClaim=now

update()

}

function daily(){

let now=Date.now()

if(now-save.lastDaily<86400000){
document.getElementById("dailyStatus").innerText="Claimed"
return
}

save.coins+=50
save.lastDaily=now

update()

}

function upgrade(card){

if(card=="basic"){

let cost=save.basicPower*200

if(save.coins>=cost && save.basicPower<3){

save.coins-=cost
save.basicPower++

}

}

if(card=="kar"){

if(!save.karUnlocked)return

let cost=save.karPower*300

if(save.coins>=cost && save.karPower<3){

save.coins-=cost
save.karPower++

}

}

update()

}

function hyper(card){

if(card=="basic"){

if(save.basicPower>=2 && !save.basicHyper && save.coins>=500){

save.coins-=500
save.basicHyper=true

}

}

if(card=="kar"){

if(save.karPower>=2 && !save.karHyper && save.coins>=500){

save.coins-=500
save.karHyper=true

}

}

update()

}

function unlockKar(){

if(save.coins>=1000 && !save.karUnlocked){

save.coins-=1000
save.karUnlocked=true
save.karPower=1

}

update()

}

function rebirth(){

if(save.coins<10000)return

save.coins=0
save.basicPower=1
save.basicHyper=false
save.karUnlocked=false
save.karPower=0
save.karHyper=false

save.rebirths++

update()

}

function update(){

document.getElementById("coins").innerText="Coins: "+Math.floor(save.coins)

document.getElementById("cph").innerText="Coins / Hour: "+coinsPerHour()

document.getElementById("rebirths").innerText="🔥 Rebirths: "+save.rebirths

document.getElementById("basicPower").innerText="Power "+save.basicPower+"/3"

if(save.karUnlocked){

document.getElementById("karPower").innerText="Power "+save.karPower+"/3"
document.getElementById("unlockKar").style.display="none"

}else{

document.getElementById("karPower").innerText="LOCKED"

}

localStorage.setItem("gameSave",JSON.stringify(save))

}

update()

</script>

</body>
</html>
